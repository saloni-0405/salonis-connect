{% extends 'base.html' %}

{% block content %}

<h2 class="text-center mb-4">Edit Profile</h2>

<div class="card p-4 shadow-sm">

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <div class="mb-3">
        <label>Phone</label>
        <input type="text" name="phone" class="form-control" value="{{ worker.phone }}">
    </div>

    <div class="mb-3">
        <label>Experience</label>
        <input type="number" name="experience" class="form-control" value="{{ worker.experience }}">
    </div>

    <div class="mb-3">
        <label>Address</label>
        <textarea name="address" class="form-control">{{ worker.address }}</textarea>
    </div>

    <div class="mb-3">
        <label>Bio</label>
        <textarea name="bio" class="form-control">{{ worker.bio }}</textarea>
    </div>

    <div class="mb-3">
        <label>Profile Image</label>
        <input type="file" name="profile_image" class="form-control">
    </div>

    <button class="btn btn-primary w-100">
        Update Profile
    </button>

</form>

</div>

{% endblock %}
