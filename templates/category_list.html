{% extends 'base.html' %}

{% block content %}
<h2 class="mb-4 text-center">Service Categories</h2>

<div class="row">
    {% for category in categories %}
    <div class="col-md-4 mb-4">
        <div class="card shadow-sm">
            <div class="card-body text-center">
                <h5 class="card-title">{{ category.name }}</h5>
                <a href="/workers/{{ category.id }}/" class="btn btn-primary mt-2"></a>
                    View Workers
                </a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
