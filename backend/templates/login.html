<!DOCTYPE html>
<html>

<head>

<title>Login</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
}

.login-box{
width:300px;
margin:100px auto;
background:white;
padding:30px;
border-radius:10px;
text-align:center;
}

input{
width:90%;
padding:10px;
margin:10px;
}

button{
padding:10px 20px;
background:#28a745;
color:white;
border:none;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Login</h2>

<form method="POST">

{% csrf_token %}

<input type="text" name="username" placeholder="Username">

<input type="password" name="password" placeholder="Password">

<button type="submit">Login</button>

</form>

</div>

</body>

</html>
